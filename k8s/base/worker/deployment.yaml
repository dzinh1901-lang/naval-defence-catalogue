apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: naval-dt
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: naval-dt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        app.kubernetes.io/name: worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: naval-dt
    spec:
      containers:
        - name: worker
          image: ghcr.io/dzinh1901-lang/naval-defence-catalogue/worker:latest
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: naval-dt-config
                  key: NODE_ENV
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: naval-dt-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
