name: Deploy – Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (e.g. v1.2.0)"
        required: true
        default: latest

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/naval-api:${{ github.event.inputs.image_tag }}
          docker pull ghcr.io/${{ github.repository_owner }}/naval-web:${{ github.event.inputs.image_tag }}
          docker pull ghcr.io/${{ github.repository_owner }}/naval-worker:${{ github.event.inputs.image_tag }}

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          docker run --rm \
            -e DATABASE_URL="${DATABASE_URL}" \
            ghcr.io/${{ github.repository_owner }}/naval-api:${{ github.event.inputs.image_tag }} \
            node -e "require('./apps/api/scripts/migrate-deploy.mjs')"

      - name: Deploy services
        env:
          DEPLOY_HOOK_URL: ${{ secrets.STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${DEPLOY_HOOK_URL}" ]; then
            echo "STAGING_DEPLOY_HOOK_URL is required for staging deployment."
            echo "Configure it in the staging environment secrets before running this workflow."
            exit 1
          fi

          curl -fsSL -X POST "${DEPLOY_HOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "{\"tag\": \"${{ github.event.inputs.image_tag }}\"}"

      - name: Set up Node.js
        if: ${{ vars.DEPLOYMENT_VERIFY_API_URL != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v3
        if: ${{ vars.DEPLOYMENT_VERIFY_API_URL != '' }}
        with:
          version: 10.4.1

      - name: Install dependencies
        if: ${{ vars.DEPLOYMENT_VERIFY_API_URL != '' }}
        run: pnpm install --frozen-lockfile

      - name: Verify deployment
        if: ${{ vars.DEPLOYMENT_VERIFY_API_URL != '' }}
        env:
          DEPLOYMENT_VERIFY_API_URL: ${{ vars.DEPLOYMENT_VERIFY_API_URL }}
          DEPLOYMENT_VERIFY_WEB_URL: ${{ vars.DEPLOYMENT_VERIFY_WEB_URL }}
          AUTH_BOOTSTRAP_SECRET: ${{ secrets.AUTH_BOOTSTRAP_SECRET }}
        run: pnpm verify:deployment
