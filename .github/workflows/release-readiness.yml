name: Release Readiness

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-readiness:
    name: Verify release readiness
    runs-on: ubuntu-latest
    env:
      PRODUCTION_SMOKE_ARTIFACT_DIR: artifacts/production-smoke
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10.4.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify workspace
        run: pnpm verify

      - name: Run production smoke pipeline
        run: pnpm smoke:production

      - name: Upload release readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-artifacts
          path: artifacts/production-smoke
          if-no-files-found: ignore
