name: Release Readiness

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-readiness:
    name: Verify release readiness
    runs-on: ubuntu-latest
    env:
      STARTUP_SMOKE_ARTIFACT_DIR: artifacts/startup-smoke
      PRODUCTION_SMOKE_ARTIFACT_DIR: artifacts/production-smoke
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10.4.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm db:validate

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint workspace
        run: pnpm lint

      - name: Type check workspace
        run: pnpm typecheck

      - name: Run runtime contract tests
        run: pnpm test

      - name: Build workspace
        run: pnpm build

      - name: Verify build artifacts
        run: pnpm verify:artifacts

      - name: Run built-artifact startup smoke
        run: pnpm smoke:startup

      - name: Run production smoke pipeline
        run: pnpm smoke:production

      - name: Upload release readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-artifacts
          path: |
            artifacts/startup-smoke
            artifacts/production-smoke
          if-no-files-found: ignore
