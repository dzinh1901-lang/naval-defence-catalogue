name: Deploy – Production

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Docker image tag to deploy"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (e.g. v1.2.0)"
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/naval-api:${{ inputs.image_tag }}
          docker pull ghcr.io/${{ github.repository_owner }}/naval-web:${{ inputs.image_tag }}
          docker pull ghcr.io/${{ github.repository_owner }}/naval-worker:${{ inputs.image_tag }}

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          docker run --rm \
            -e DATABASE_URL="${DATABASE_URL}" \
            ghcr.io/${{ github.repository_owner }}/naval-api:${{ inputs.image_tag }} \
            node -e "require('./apps/api/scripts/migrate-deploy.mjs')"

      - name: Deploy services
        env:
          DEPLOY_HOOK_URL: ${{ secrets.PRODUCTION_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "${DEPLOY_HOOK_URL}" ]; then
            curl -fsSL -X POST "${DEPLOY_HOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "{\"tag\": \"${{ inputs.image_tag }}\"}"
          else
            echo "No PRODUCTION_DEPLOY_HOOK_URL secret set – skipping remote deploy hook."
            echo "Configure PRODUCTION_DEPLOY_HOOK_URL in the production environment secrets to automate deployment."
          fi

      - name: Set up Node.js
        if: ${{ vars.DEPLOYMENT_VERIFY_API_URL != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v3
        if: ${{ vars.DEPLOYMENT_VERIFY_API_URL != '' }}
        with:
          version: 10.4.1

      - name: Install dependencies
        if: ${{ vars.DEPLOYMENT_VERIFY_API_URL != '' }}
        run: pnpm install --frozen-lockfile

      - name: Verify deployment
        if: ${{ vars.DEPLOYMENT_VERIFY_API_URL != '' }}
        env:
          DEPLOYMENT_VERIFY_API_URL: ${{ vars.DEPLOYMENT_VERIFY_API_URL }}
          DEPLOYMENT_VERIFY_WEB_URL: ${{ vars.DEPLOYMENT_VERIFY_WEB_URL }}
          AUTH_BOOTSTRAP_SECRET: ${{ secrets.AUTH_BOOTSTRAP_SECRET }}
        run: pnpm verify:deployment
