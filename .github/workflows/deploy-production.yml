name: Deploy — Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (e.g. v1.0.0-m6)"
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
      url: https://naval-dt.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.1"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image tags in kustomization
        run: |
          cd k8s/overlays/production
          kustomize edit set image \
            ghcr.io/dzinh1901-lang/naval-defence-catalogue/api:${{ steps.tag.outputs.tag }} \
            ghcr.io/dzinh1901-lang/naval-defence-catalogue/web:${{ steps.tag.outputs.tag }} \
            ghcr.io/dzinh1901-lang/naval-defence-catalogue/worker:${{ steps.tag.outputs.tag }}

      - name: Apply secrets from GitHub Secrets
        run: |
          kubectl create secret generic naval-dt-secrets \
            --namespace=naval-dt-production \
            --from-literal=DATABASE_URL="${{ secrets.PRODUCTION_DATABASE_URL }}" \
            --from-literal=JWT_SECRET="${{ secrets.PRODUCTION_JWT_SECRET }}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.PRODUCTION_POSTGRES_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests (production)
        run: kubectl apply -k k8s/overlays/production

      - name: Wait for rollout — API
        run: kubectl rollout status deployment/prod-api -n naval-dt-production --timeout=600s

      - name: Wait for rollout — Web
        run: kubectl rollout status deployment/prod-web -n naval-dt-production --timeout=600s

      - name: Wait for rollout — Worker
        run: kubectl rollout status deployment/prod-worker -n naval-dt-production --timeout=600s

      - name: Smoke test production API health
        run: |
          sleep 10
          kubectl run smoke-test \
            --namespace=naval-dt-production \
            --image=curlimages/curl:8 \
            --restart=Never \
            --rm -i \
            -- curl -sf http://prod-api:4000/api/v1/health
