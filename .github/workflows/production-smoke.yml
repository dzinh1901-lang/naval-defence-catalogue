name: Production Smoke

on:
  push:
    branches: [main, develop, "feat/**", "fix/**", "copilot/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  production-smoke:
    name: Production smoke pipeline
    runs-on: ubuntu-latest
    env:
      PRODUCTION_SMOKE_ARTIFACT_DIR: artifacts/production-smoke
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10.4.1

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run production smoke pipeline
        run: pnpm smoke:production

      - name: Upload production smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-artifacts
          path: artifacts/production-smoke
          if-no-files-found: ignore
