version: '3.9'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: naval
    ports:
      - "5432:5432"

  api:
    build: ./apps/api
    command: pnpm start:dev
    volumes:
      - .:/app
    ports:
      - "4000:4000"
    depends_on:
      - db
