# Naval Digital Twin Platform — Local Development Docker Compose
# ──────────────────────────────────────────────────────────────
# Usage:
#   docker compose up                  (full stack)
#   docker compose up db               (database only)
#   docker compose up db api           (database + API)
#   docker compose logs -f api         (follow API logs)
#
# Development note: api/web/worker run with volume mounts so that
# source changes trigger hot-reload via nest --watch / next dev.
# ──────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: naval
      POSTGRES_PASSWORD: naval_dev
      POSTGRES_DB: naval_dt
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naval -d naval_dt"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS API ────────────────────────────────────────────────
  # Uses source volume mounts for hot-reload via `nest start --watch`
  api:
    image: node:20
    working_dir: /app
    command: sh /app/infra/docker/dev-entrypoint.sh api
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://naval:naval_dev@db:5432/naval_dt
      PORT: 4000
      NODE_ENV: development
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:4000/api/v1/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
      - api_dist:/app/apps/api/dist
      - pnpm_store:/pnpm/store
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Next.js Web ───────────────────────────────────────────────
  # Uses source volume mounts for hot-reload via `next dev`
  web:
    image: node:20
    working_dir: /app
    command: sh /app/infra/docker/dev-entrypoint.sh web
    env_file:
      - path: .env
        required: false
    environment:
      # Server-side API URL: web → api via Docker internal network
      API_URL: http://api:4000
      # Browser-side API URL: host browser → localhost
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NODE_ENV: development
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/apps/web/.next
      - pnpm_store:/pnpm/store
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Worker ────────────────────────────────────────────────────
  # Uses source volume mounts for hot-reload via `tsx watch`
  worker:
    image: node:20
    working_dir: /app
    command: sh /app/infra/docker/dev-entrypoint.sh worker
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://naval:naval_dev@db:5432/naval_dt
      NODE_ENV: development
    volumes:
      - .:/app
      - worker_node_modules:/app/node_modules
      - worker_dist:/app/apps/worker/dist
      - pnpm_store:/pnpm/store
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
  api_node_modules:
  api_dist:
  web_node_modules:
  worker_node_modules:
  worker_dist:
  web_next:
  pnpm_store:
